<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <title>Gallery</title>
    <link rel="stylesheet" href="styles1.css" />

    <style>
      /* Fix for navbar overlap */
      .gallery {
        padding-top: 100px;
        padding-bottom: 60px;
        text-align: center;
      }

      .gallery h2 {
        font-size: 36px;
        color: #7f5539;
        margin-bottom: 40px;
      }

      .gallery h2::after {
        content: "";
        width: 60px;
        height: 3px;
        background: #7f5539;
        display: block;
        margin: 10px auto;
      }

      /* GRID */
      .gallery-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 0 40px;
      }

      /* IMAGES */
      .gallery-container img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 15px;
        transition: 0.4s;
        cursor: pointer;
      }

      /* HOVER EFFECT 🔥 */
      .gallery-container img:hover {
        transform: scale(1.08);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
